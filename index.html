<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Risk Profile Assessment — Trinity Capital Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --coral:#E8394A;
  --coral-light:#FBECED;
  --coral-dark:#C02030;
  --charcoal:#1E2023;
  --charcoal-mid:#2E3235;
  --charcoal-light:#4A4F55;
  --stone:#7A808A;
  --silver:#B8BCC4;
  --fog:#E8EAF0;
  --snow:#F4F5F8;
  --white:#FFFFFF;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --radius:8px;
  --radius-lg:12px;
}
html{font-size:16px;background:var(--white);}
body{font-family:var(--sans);color:var(--charcoal);background:var(--white);min-height:100vh;}

/* TOP BAR */
.topbar{height:3px;background:linear-gradient(90deg,var(--charcoal) 0%,var(--coral) 100%);}

/* HEADER */
.header{padding:28px 0 22px;border-bottom:1px solid var(--fog);}
.header-inner{max-width:680px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.logo-mark{display:flex;align-items:center;gap:14px;}
.logo-geo{width:34px;height:34px;flex-shrink:0;}
.logo-text{display:flex;flex-direction:column;gap:1px;}
.logo-name{font-family:var(--serif);font-size:17px;font-weight:600;letter-spacing:0.18em;color:var(--charcoal);line-height:1;}
.logo-sub{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--stone);font-weight:400;}
.logo-img{height:48px;width:auto;display:block;}
.header-badge{font-size:11px;letter-spacing:0.08em;color:var(--stone);font-weight:400;text-transform:uppercase;border:1px solid var(--fog);padding:4px 12px;border-radius:3px;}

/* PROGRESS */
.progress-wrap{max-width:680px;margin:0 auto;padding:16px 24px 0;}
.progress-bar{height:2px;background:var(--fog);border-radius:1px;}
.progress-fill{height:100%;background:var(--coral);border-radius:1px;transition:width 0.5s ease;}
.progress-label{font-size:11px;color:var(--stone);margin-top:6px;letter-spacing:0.05em;}

/* MAIN */
main{max-width:680px;margin:0 auto;padding:40px 24px 80px;}

/* INTRO */
.intro-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--coral);font-weight:500;margin-bottom:10px;}
.intro-h1{font-family:var(--serif);font-size:38px;font-weight:500;line-height:1.15;color:var(--charcoal);margin-bottom:10px;letter-spacing:0.01em;}
.intro-sub{font-size:15px;color:var(--charcoal-light);line-height:1.65;margin-bottom:28px;}
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--fog);border:1px solid var(--fog);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:28px;}
.intro-cell{background:var(--white);padding:16px 18px;}
.intro-cell-label{font-size:11px;color:var(--stone);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
.intro-cell-val{font-size:15px;font-weight:500;color:var(--charcoal);}
.intro-note{font-size:13px;color:var(--stone);line-height:1.6;margin-bottom:28px;padding-left:14px;border-left:2px solid var(--fog);}
.name-label{font-size:13px;font-weight:500;color:var(--charcoal-light);margin-bottom:6px;letter-spacing:0.03em;}
.name-input{width:100%;padding:13px 16px;border:1px solid var(--fog);border-radius:var(--radius);font-family:var(--sans);font-size:15px;color:var(--charcoal);background:var(--white);outline:none;transition:border-color 0.15s;margin-bottom:20px;}
.name-input:focus{border-color:var(--coral);}

/* SECTIONS */
.section-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.section-pill{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--coral);background:var(--coral-light);padding:3px 10px;border-radius:20px;}
.section-num{font-size:11px;color:var(--stone);}

/* QUESTION */
.q-text{font-family:var(--serif);font-size:22px;font-weight:500;line-height:1.35;color:var(--charcoal);margin-bottom:24px;letter-spacing:0.01em;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border:1px solid var(--fog);border-radius:var(--radius);cursor:pointer;background:var(--white);transition:all 0.15s;text-align:left;width:100%;}
.opt:hover{border-color:var(--silver);background:var(--snow);}
.opt.selected{border-color:var(--coral);background:var(--coral-light);}
.opt-radio{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--fog);margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.opt.selected .opt-radio{border-color:var(--coral);background:var(--coral);}
.opt-radio-dot{width:7px;height:7px;border-radius:50%;background:var(--white);opacity:0;}
.opt.selected .opt-radio-dot{opacity:1;}
.opt-text{font-size:14px;line-height:1.5;color:var(--charcoal);}
.opt.selected .opt-text{color:var(--charcoal);}

/* BUTTONS */
.btn-primary{display:block;width:100%;padding:15px;font-size:14px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--white);background:var(--charcoal);border:none;border-radius:var(--radius);cursor:pointer;transition:background 0.15s;font-family:var(--sans);}
.btn-primary:hover{background:var(--coral);}
.btn-coral{background:var(--coral);}
.btn-coral:hover{background:var(--coral-dark);}
.btn-ghost{display:block;width:100%;padding:13px;font-size:13px;color:var(--stone);background:none;border:1px solid var(--fog);border-radius:var(--radius);cursor:pointer;font-family:var(--sans);transition:all 0.15s;margin-top:8px;}
.btn-ghost:hover{border-color:var(--silver);color:var(--charcoal-light);}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.back-btn{font-size:13px;color:var(--stone);background:none;border:none;cursor:pointer;padding:0;font-family:var(--sans);}
.back-btn:hover{color:var(--charcoal);}
.q-counter{font-size:12px;color:var(--stone);letter-spacing:0.04em;}

/* RESULTS */
.profile-card{border:1.5px solid var(--coral);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px;}
.profile-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--coral);margin-bottom:6px;}
.profile-name{font-family:var(--serif);font-size:36px;font-weight:500;color:var(--charcoal);margin-bottom:2px;}
.profile-tag{font-size:14px;color:var(--stone);margin-bottom:16px;font-style:italic;}
.profile-desc{font-size:14px;line-height:1.65;color:var(--charcoal-light);}
.cap-alert{margin-top:16px;padding:12px 14px;background:#FFF8E1;border:1px solid #F9A825;border-radius:var(--radius);font-size:13px;color:#6D4C00;line-height:1.55;}

.section-card{background:var(--white);border:1px solid var(--fog);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;}
.section-card-title{font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--charcoal);margin-bottom:16px;}
.score-row{margin-bottom:12px;}
.score-row-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.score-row-label{font-size:13px;color:var(--charcoal-light);}
.score-row-val{font-size:12px;color:var(--stone);}
.bar-track{height:5px;background:var(--fog);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;background:var(--coral);border-radius:3px;}

.alloc-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.alloc-label{font-size:13px;color:var(--charcoal-light);min-width:170px;}
.alloc-track{flex:1;height:7px;background:var(--fog);border-radius:4px;overflow:hidden;}
.alloc-fill{height:100%;background:var(--charcoal);border-radius:4px;}
.alloc-pct{font-size:13px;font-weight:500;min-width:32px;text-align:right;}
.alloc-stats{display:flex;gap:24px;margin-bottom:14px;}
.alloc-stat{display:flex;flex-direction:column;gap:2px;}
.alloc-stat-label{font-size:11px;color:var(--stone);letter-spacing:0.04em;}
.alloc-stat-val{font-size:14px;font-weight:500;color:var(--charcoal);}

.profile-table{width:100%;border-collapse:collapse;min-width:440px;}
.profile-table th{text-align:left;padding:7px 10px;font-size:11px;font-weight:500;color:var(--stone);letter-spacing:0.05em;text-transform:uppercase;border-bottom:1px solid var(--fog);}
.profile-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid var(--fog);}
.profile-table tr.me td{background:var(--coral-light);}
.profile-table tr.me td:first-child{color:var(--coral);font-weight:500;}

.cta-card{background:var(--charcoal);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;color:var(--white);}
.cta-card h3{font-family:var(--serif);font-size:22px;font-weight:500;margin-bottom:8px;color:var(--white);}
.cta-card p{font-size:14px;color:rgba(255,255,255,0.65);line-height:1.6;margin-bottom:20px;}
.btn-cta{display:inline-block;padding:13px 24px;background:var(--coral);color:var(--white);font-size:13px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--sans);text-decoration:none;}

.disclaimer{font-size:11px;color:var(--stone);line-height:1.65;padding-top:20px;border-top:1px solid var(--fog);}
.esg-note{background:var(--snow);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--charcoal-light);}
.esg-note span{font-weight:500;color:var(--charcoal);}
.score-interp{margin-top:8px;padding:10px 12px;background:var(--snow);border-left:2px solid var(--coral);border-radius:0 var(--radius) var(--radius) 0;font-size:12.5px;color:var(--charcoal-light);line-height:1.6;}
.score-interp strong{color:var(--charcoal);font-weight:500;}
.score-weight-note{display:inline-block;font-size:11px;color:var(--stone);font-style:italic;margin-top:3px;}

.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
.result-name{font-size:13px;color:var(--stone);}
.result-name strong{color:var(--charcoal);font-weight:500;}
.restart-btn{font-size:12px;color:var(--stone);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:var(--sans);}

/* FOOTER */
footer{border-top:1px solid var(--fog);padding:20px 24px;text-align:center;}
.footer-inner{max-width:680px;margin:0 auto;}
.footer-logo{font-family:var(--serif);font-size:13px;letter-spacing:0.15em;color:var(--stone);}
.footer-tagline{font-size:11px;color:var(--silver);letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;}

@media(max-width:500px){
  .intro-h1{font-size:30px;}
  .intro-grid{grid-template-columns:1fr;}
  .q-text{font-size:19px;}
  .alloc-label{min-width:120px;}
  .header-badge{display:none;}
}
</style>
</head>

<form name="trinity-rpq" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden="">
  <input type="text" name="bot-field">

<div class="topbar"></div>
<header class="header">
  <div class="header-inner">

<main id="mc"></main>

<footer>

</footer>

{id:12,s:"C",sn:"Time Horizon",t:"If your investment fell significantly in the first year, how would you most likely respond?",opts:[

desc:"You have the highest tolerance for risk and are focused on maximising long-term growth. You accept the real possibility of significant short-term losses — including losses exceeding 35% in adverse conditions — and have the financial resilience and psychological temperament to remain invested through severely volatile periods.",
alloc:[{n:"Cash & Money Market",p:5},{n:"Bonds & Gilts",p:5},{n:"Equities",p:80},{n:"Alternatives",p:10}],
ret:"9–12%+ p.a.",wy:"-35% to -45%",sc:{b:259000,g:285000},band:"83–100"}
};

const WT={A:1.4,B:1.2,C:1.5,D:1.0,E:1.0};
const SMETA={
  A:{n:"Attitude to Risk",w:35},
  B:{n:"Capacity for Loss",w:30},
  C:{n:"Time Horizon",w:15},
  D:{n:"Knowledge & Experience",w:10},
  E:{n:"Behavioural Factors",w:10}
};

let st={scr:"intro",step:0,ans:{},name:"",email:"",esg:null};

function calc(){
  const raw={A:0,B:0,C:0,D:0,E:0};
  QS.forEach(q=>{if(st.ans[q.id])raw[q.s]+=st.ans[q.id];});
  let tot=0;const wt={};
  Object.keys(raw).forEach(s=>{wt[s]=Math.round(raw[s]*WT[s]*10)/10;tot+=wt[s];});
  return{raw,wt,tot:Math.round(tot)};
}

function getProf(tot,rawB){
  let k;
  if(tot<=24)k="Low";
  else if(tot<=44)k="Cautious";
  else if(tot<=64)k="Balanced";
  else if(tot<=82)k="Adventurous";
  else k="High";
  const capped=["Balanced","Adventurous","High"].includes(k)&&rawB<=10;
  if(capped)k="Cautious";
  return{k,capped};
}

function fmt(n){return"£"+n.toLocaleString();}

function progPct(){
  if(st.scr==="results")return 100;
  if(st.scr==="esg")return Math.round(16/17*100);
  if(st.scr==="question")return Math.round(st.step/17*100);
  return 0;
}

function progLabel(){
  if(st.scr==="intro")return"Risk profile assessment";
  if(st.scr==="results")return"Complete";
  if(st.scr==="esg")return"Question 17 of 17 — Optional";
  return"Question "+(st.step+1)+" of "+QS.length+" — "+SMETA[QS[st.step].s].n;
}

function renderQ(){
  const q=QS[st.step];
  const ans=st.ans[q.id]||null;
  return`<div class="nav">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <span class="q-counter">Question ${st.step+1} of ${QS.length}</span>
  </div>

  <div class="q-text">${q.t}</div>
  <div class="opts">
    ${q.opts.map(o=>`<button class="opt${ans===o.v?" selected":""}" onclick="pickAns(${o.v})">
      <span class="opt-radio"><span class="opt-radio-dot"></span></span>
      <span class="opt-text">${o.t}</span>
    </button>`).join("")}
  </div>`;
}

function renderESG(){
  const ans=st.esg;
  return`<div class="nav">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <span class="q-counter">Question 17 of 17 — Optional</span>
  </div>
  <div class="section-meta"><span class="section-pill" style="background:#EEF2E8;color:#3A5A0A;">Sustainable Investing</span></div>

      <span class="opt-text">${o.t}</span>
    </button>`).join("")}
  </div>
  <button class="btn-ghost" onclick="skipESG()">Skip this question</button>`;
}

function renderResults(){
  const{raw,wt,tot}=calc();
  const{k,capped}=getProf(tot,raw.B);
  const p=PROFS[k];
  const esgLabels={strong:"Important — to be central to portfolio",moderate:"Preferred where possible",neutral:"No strong preference",none:"Not a priority — returns first"};

  const scoreBreak=Object.entries(SMETA).map(([s,meta])=>{
    const pct=Math.round((wt[s]/meta.w)*100);

    // Build human-readable interpretation for each section
    const INTERP={
      A:{
        label:"Attitude to Risk",
        weightNote:"This is the highest-weighted section (35 pts). It captures how you emotionally and intellectually approach investment risk.",
        low:"Your responses suggest a <strong>cautious disposition</strong> — you value stability and predictability, and significant market fluctuations would cause you meaningful discomfort.",
        mid:"Your responses suggest a <strong>balanced outlook</strong> — you accept some volatility as necessary for returns, but you would find severe or prolonged losses uncomfortable.",
        high:"Your responses suggest a <strong>growth-oriented mindset</strong> — you are able to view market downturns with perspective and remain focused on long-term objectives."
      },
      B:{
        label:"Capacity for Loss",
        weightNote:"Weighted at 30 pts, this section is critical. Unlike attitude, capacity for loss reflects your objective financial circumstances — it can override a higher emotional risk score under FCA guidelines.",
        low:"Your financial position indicates <strong>limited resilience to loss</strong>. A significant fall in investment value could materially affect your living standards or ability to meet financial commitments.",
        mid:"Your financial position indicates a <strong>moderate ability to absorb losses</strong>. While a significant fall would be uncomfortable, it would not critically jeopardise your financial position.",
        high:"Your financial position indicates <strong>strong resilience to potential losses</strong>. You have sufficient financial cushion that even a significant fall in investment value would not materially affect your standard of living."
      },
      C:{
        label:"Time Horizon",
        weightNote:"Weighted at 15 pts, your investment horizon is a key driver of how much risk is appropriate — longer timeframes allow markets greater opportunity to recover from short-term volatility.",
        low:"A <strong>shorter time horizon</strong> limits your ability to ride out market downturns, which generally supports a more conservative allocation to protect capital when it may be needed sooner.",
        mid:"A <strong>medium-term horizon</strong> provides reasonable scope for recovery from short-term volatility, supporting a moderately diversified approach balancing growth and capital protection.",
        high:"A <strong>longer time horizon</strong> provides significant scope to weather short-term volatility. This supports a higher equity allocation where the potential for greater long-term returns typically outweighs near-term fluctuations."
      },
      D:{
        label:"Knowledge & Experience",
        weightNote:"Weighted at 10 pts, this section assesses your familiarity with investment products. Greater knowledge and experience generally supports a wider range of suitable investment strategies.",
        low:"Your investment knowledge and experience is at an <strong>earlier stage</strong>. Your adviser will take time to ensure any recommended strategy is clearly explained and well understood.",
        mid:"You have a <strong>reasonable level of investment knowledge</strong>, which means you are likely to understand the principles behind the recommended strategy and the risks involved.",
        high:"Your <strong>strong investment knowledge and experience</strong> means you are well-placed to understand more complex strategies and have realistic expectations of how markets behave over time."
      },
      E:{
        label:"Behavioural Factors",
        weightNote:"Weighted at 10 pts, this section explores whether your actual financial behaviour is consistent with your stated preferences — a useful cross-check on the overall picture.",
        low:"Your past financial behaviour reflects a <strong>cautious, risk-averse approach</strong>. You tend to favour certainty over opportunity, and losses weigh more heavily than equivalent gains.",
        mid:"Your past financial behaviour reflects a <strong>measured, considered approach</strong>. You weigh risk and reward thoughtfully, and your response to losses is generally proportionate.",
        high:"Your past financial behaviour reflects a <strong>confident, opportunity-seeking approach</strong>. You have made meaningful financial decisions under uncertainty and process gains and losses evenly."
      }
    };

    const section=INTERP[s];
    let interpText;
    if(pct<40) interpText=section.low;
    else if(pct<70) interpText=section.mid;
    else interpText=section.high;

    return`<div class="score-row">
      <div class="score-row-head">
        <span class="score-row-label">${meta.n}</span>
        <span class="score-row-val">${(wt[s]||0).toFixed(1)} / ${meta.w} (${meta.w}% weight)</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="score-interp"><span class="score-weight-note">${section.weightNote}</span><br/>${interpText}</div>
    </div>`;
  }).join("");

  const allocBars=p.alloc.map(a=>`<div class="alloc-row">
    <span class="alloc-label">${a.n}</span>
    <div class="alloc-track"><div class="alloc-fill" style="width:${a.p}%"></div></div>
    <span class="alloc-pct">${a.p}%</span>
  </div>`).join("");

  const profileRows=Object.values(PROFS).map(pr=>`<tr class="${pr.k===k?"me":""}">
    <td style="font-weight:${pr.k===k?500:400};color:${pr.k===k?"var(--coral)":"inherit"};">${pr.k===k?"→ ":""}${pr.label}</td>
    <td>${pr.ret}</td>
    <td>${pr.wy}</td>
    <td>${fmt(pr.sc.b)}</td>
    <td style="color:var(--stone);">${pr.band}</td>
  </tr>`).join("");

  return`<div class="result-header">
    <span class="result-name">Results for: <strong>${st.name||"Client"}</strong>${st.adviser ? ` &nbsp;·&nbsp; Adviser: <strong>${st.adviser}</strong>` : ""}</span>
    <button class="restart-btn" onclick="restart()">Start again</button>
  </div>
  <div class="profile-card">
    <div class="profile-eyebrow">Your indicative risk profile</div>
    <div class="profile-name">${p.label}</div>
    <div class="profile-tag">${p.tag}</div>
    <div class="profile-desc">${p.desc}</div>
    ${capped?`<div class="cap-alert">Your overall score indicated a higher profile, but your capacity for loss responses suggest a more conservative approach is appropriate. Your profile has been adjusted to Cautious accordingly.</div>`:""}
  </div>

  <div class="section-card">
    <div class="section-card-title">Score breakdown — total: ${tot} / 100</div>
    ${scoreBreak}
  </div>

  <div class="section-card">
    <div class="section-card-title">Indicative portfolio allocation</div>
    <div class="alloc-stats">
      <div class="alloc-stat"><span class="alloc-stat-label">Target return</span><span class="alloc-stat-val">${p.ret}</span></div>
      <div class="alloc-stat"><span class="alloc-stat-label">Typical worst year</span><span class="alloc-stat-val">${p.wy}</span></div>
      <div class="alloc-stat"><span class="alloc-stat-label">10yr target (£100k)</span><span class="alloc-stat-val">${fmt(p.sc.b)}</span></div>
    </div>
    ${allocBars}
    <p style="font-size:11px;color:var(--stone);margin-top:10px;line-height:1.55;">Illustrative allocation only. Actual portfolio construction confirmed by your Trinity adviser following your full suitability assessment.</p>
  </div>

  <div class="section-card" style="overflow-x:auto;">
    <div class="section-card-title">All profiles at a glance</div>
    <table class="profile-table">
      <thead><tr>
        <th>Profile</th><th>Target return</th><th>Worst year</th><th>10yr target (£100k)</th><th>Score band</th>
      </tr></thead>
      <tbody>${profileRows}</tbody>
    </table>
    <p style="font-size:11px;color:var(--stone);margin-top:10px;line-height:1.55;">Illustrative projections only. Capital is at risk. Not a guarantee of future returns.</p>
  </div>

  ${st.esg?`<div class="esg-note">ESG preference: <span>${esgLabels[st.esg]}</span> — your adviser will factor this into your portfolio recommendations.</div>`:""}

  <div class="cta-card">
    <h3>Thank you</h3>
    <p>We will review this in line with your objectives and fact find, and your adviser will discuss it with you in more detail.</p>
    <div id="emailStatus" style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:16px;"></div>
    <button class="btn-cta" id="submitBtn" onclick="submitToNetlify()" style="margin-bottom:10px;width:100%;">Submit to your adviser ✓</button>
  </div>

  <div class="disclaimer">
    <strong>Important information:</strong> This questionnaire is for guidance purposes only and does not constitute financial advice. The indicative profile is based solely on your self-reported answers and does not account for all aspects of your personal financial circumstances. Trinity Capital Partners (FCA Reg. 523393) trades as Trinity Global Capital UK Ltd and is authorised and regulated by the Financial Conduct Authority. Capital is at risk. The value of investments and the income from them can fall as well as rise and you may get back less than you invest. Past performance is not a reliable guide to future returns.
  </div>`;
}

function render(){
  const mc=document.getElementById("mc");
  const pb=document.getElementById("pb");
  const pl=document.getElementById("pl");
  if(!mc)return;
  pb.style.width=progPct()+"%";
  pl.textContent=progLabel();var _bl=document.getElementById("brandLogo");if(_bl&&!_bl.src)_bl.src=LOGO_NAVY;
  mc.style.opacity="0";
  setTimeout(()=>{
    if(st.scr==="intro")mc.innerHTML=renderIntro();
    else if(st.scr==="question")mc.innerHTML=renderQ();
    else if(st.scr==="esg")mc.innerHTML=renderESG();
    else if(st.scr==="results"){mc.innerHTML=renderResults();setTimeout(sendResults,60);}
    mc.style.opacity="1";
    mc.style.transition="opacity 0.2s ease";
  },140);
}

window.startQuiz=function(){
  const nf=document.getElementById("nf");
  const ef=document.getElementById("ef");
  const af=document.getElementById("adviserSelect");
  const err=document.getElementById("introErr");
  const advErr=document.getElementById("adviserErr");
  const name=nf?nf.value.trim():"";
  const email=ef?ef.value.trim():"";
  const adviser=af?af.value:"";
  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if(!name){err.textContent="Please enter your name.";err.style.display="block";return;}
  if(!emailOk){err.textContent="Please enter a valid email address so we can send your summary.";err.style.display="block";return;}
  if(!adviser){advErr.textContent="Please select your adviser.";advErr.style.display="block";return;}
  err.style.display="none";advErr.style.display="none";
  st.name=name;st.email=email;st.adviser=adviser;
  st.scr="question";st.step=0;render();
};
window.pickAns=function(v){
  const q=QS[st.step];
  st.ans[q.id]=v;render();
  setTimeout(()=>{
    if(st.step<QS.length-1){st.step++;render();}
    else{st.scr="esg";render();}
  },380);
};
window.pickESG=function(v){
  st.esg=v;render();
  setTimeout(()=>{st.scr="results";render();},380);
};
window.skipESG=function(){st.scr="results";render();};
window.goBack=function(){
  if(st.scr==="esg"){st.scr="question";st.step=QS.length-1;}
  else if(st.scr==="question"&&st.step>0){st.step--;}
  else if(st.scr==="question"&&st.step===0){st.scr="intro";}
  render();
};
window.restart=function(){
  st={scr:"intro",step:0,ans:{},name:"",esg:null};render();
};

const EMAILJS_TEMPLATE_INTERNAL = "YOUR_INTERNAL_TEMPLATE_ID_HERE"; // template that emails the onboarding mailbox
/* Each EmailJS template should declare a Dynamic Attachment whose content
   variable is named "pdf_base64" and filename uses "{{pdf_name}}". The body
   can use {{client_name}}, {{profile}}, {{score}} and {{summary}}.            */

/* Production alternative (recommended when this lives inside Obsidian):
   POST window.TRINITY_RPQ_RESULT to your own endpoint and generate + send
   the PDF server-side so client data never leaves your infrastructure.
   const RESULT_WEBHOOK = "https://api.trinitycapitalpartners.co.uk/rpq";     */

let _lastPdfBase64=null, _lastPdfName="Risk-Profile.pdf", _sent=false;

function buildResultPayload(){
  const{raw,wt,tot}=calc();
  const{k,capped}=getProf(tot,raw.B);
  const p=PROFS[k];
  return{raw,wt,tot,k,capped,p};
}

function buildPDF(){
  const{raw,wt,tot,k,capped,p}=buildResultPayload();
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const W=doc.internal.pageSize.getWidth();
  const M=48; let y=0;
  const navy=[31,41,55], coral=[255,74,87], slate=[107,122,143], ink=[21,29,38];

  // Header band
  doc.setFillColor(...ink); doc.rect(0,0,W,96,"F");
  doc.setFillColor(...coral); doc.rect(0,96,W,3,"F");
  // logo aspect ratio 404x334; draw at ~52pt tall
  try{ doc.addImage(LOGO_WHITE,"PNG",M,22,Math.round(52*404/334),52); }catch(e){}
  doc.setTextColor(255,255,255); doc.setFont("times","normal"); doc.setFontSize(10);
  doc.text("RISK PROFILE SUMMARY", W-M, 44, {align:"right"});
  doc.setFontSize(9); doc.setTextColor(205,205,205);
  doc.text("FCA Reg. 523393", W-M, 60, {align:"right"});
  y=132;

  // Client + date
  doc.setTextColor(...slate); doc.setFont("helvetica","normal"); doc.setFontSize(10);
  doc.text("PREPARED FOR", M, y);
  doc.text("DATE", W-M, y, {align:"right"});
  y+=16;
  doc.setTextColor(...ink); doc.setFont("helvetica","bold"); doc.setFontSize(13);
  doc.text(st.name||"Client", M, y);
  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  doc.text(new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}), W-M, y, {align:"right"});
  if(st.email){ y+=15; doc.setTextColor(...slate); doc.setFontSize(9.5); doc.text(st.email, M, y); }
  if(st.adviser){ y+=13; doc.setTextColor(...slate); doc.setFontSize(9.5); doc.text("Adviser: "+st.adviser, M, y); }
  y+=26;

  // Profile block
  doc.setFillColor(...navy); doc.roundedRect(M,y,W-2*M,82,8,8,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.setTextColor(...coral); doc.text("YOUR INDICATIVE RISK PROFILE", M+20, y+24);
  doc.setTextColor(255,255,255); doc.setFont("times","bold"); doc.setFontSize(26);
  doc.text(p.label, M+20, y+54);
  doc.setFont("times","italic"); doc.setFontSize(12); doc.setTextColor(205,205,205);
  doc.text(p.tag, M+20, y+72);
  doc.setFont("helvetica","bold"); doc.setFontSize(22); doc.setTextColor(255,255,255);
  doc.text(String(tot), W-M-26, y+44, {align:"right"});
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(180,185,195);
  doc.text("/100", W-M-22, y+58, {align:"right"});
  y+=104;

  // Description
  doc.setTextColor(...ink); doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
  const dlines=doc.splitTextToSize(p.desc, W-2*M);
  doc.text(dlines, M, y); y+=dlines.length*14+8;

  if(capped){
    doc.setFillColor(255,240,241); doc.setDrawColor(...coral);
    const cl=doc.splitTextToSize("Capacity for loss adjustment: your overall score indicated a higher profile, but your capacity-for-loss responses suggest a more conservative approach. Your profile has been set to Cautious in line with FCA guidance.", W-2*M-24);
    const ch=cl.length*12+20;
    doc.roundedRect(M,y,W-2*M,ch,6,6,"FD");
    doc.setTextColor(...ink); doc.setFontSize(9); doc.text(cl, M+12, y+15); y+=ch+12;
  }

  // Section breakdown
  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...slate);
  doc.text("YOUR ANSWERS BY AREA", M, y); y+=14;

  const PDF_INTERP={
    A:{
      low:"Cautious disposition — stability and predictability are important; market fluctuations cause discomfort.",
      mid:"Balanced outlook — some volatility accepted for returns; prolonged losses would be uncomfortable.",
      high:"Growth-oriented mindset — downturns viewed with perspective; focused on long-term objectives."
    },
    B:{
      low:"Limited financial resilience. A significant fall in value could materially affect living standards.",
      mid:"Moderate ability to absorb losses. Uncomfortable, but would not critically jeopardise finances.",
      high:"Strong resilience. A significant fall would not materially affect standard of living."
    },
    C:{
      low:"Shorter horizon — supports a more conservative allocation to protect capital near the access date.",
      mid:"Medium-term horizon — supports a moderately diversified approach balancing growth and protection.",
      high:"Longer horizon — supports higher equity allocation; time available to recover from short-term falls."
    },
    D:{
      low:"Knowledge at an earlier stage — adviser will ensure strategy is clearly explained.",
      mid:"Reasonable investment knowledge — likely to understand principles and risks involved.",
      high:"Strong knowledge and experience — well-placed to understand complex strategies."
    },
    E:{
      low:"Cautious, risk-averse past behaviour — losses weigh more heavily than equivalent gains.",
      mid:"Measured, considered past behaviour — risk and reward weighed thoughtfully.",
      high:"Confident, opportunity-seeking past behaviour — gains and losses processed evenly."
    }
  };

  Object.entries(SMETA).forEach(([s,meta])=>{
    const pct=Math.round((wt[s]/meta.w)*100);
    const interpSection=PDF_INTERP[s];
    let interpText;
    if(pct<40) interpText=interpSection.low;
    else if(pct<70) interpText=interpSection.mid;
    else interpText=interpSection.high;

    doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(...ink);
    doc.text(meta.n, M, y);
    doc.text((wt[s]||0).toFixed(1)+" / "+meta.w, W-M, y, {align:"right"});
    doc.setFillColor(238,240,243); doc.roundedRect(M,y+4,W-2*M,5,2,2,"F");
    doc.setFillColor(...slate); doc.roundedRect(M,y+4,(W-2*M)*pct/100,5,2,2,"F");
    y+=18;
    doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(...slate);
    const interpLines=doc.splitTextToSize(interpText, W-2*M-4);
    doc.text(interpLines, M+2, y); y+=interpLines.length*10+6;
  });
  y+=6;

  // Indicative allocation
  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...slate);
  doc.text("INDICATIVE ASSET ALLOCATION", M, y); y+=14;
  const allocCols={"Cash & Money Market":[205,205,205],"Bonds & Gilts":[107,122,143],"Equities":[255,74,87],"Alternatives":[31,41,55]};
  let bx=M; const bw=W-2*M;
  p.alloc.forEach(a=>{ const seg=bw*a.p/100; doc.setFillColor(...(allocCols[a.n]||slate)); doc.rect(bx,y,seg,18,"F"); bx+=seg; });
  y+=28;
  let lx=M;
  p.alloc.forEach(a=>{ doc.setFillColor(...(allocCols[a.n]||slate)); doc.rect(lx,y-7,8,8,"F");
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(...ink);
    const t=a.n+" "+a.p+"%"; doc.text(t, lx+12, y); lx+=doc.getTextWidth(t)+34; });
  y+=24;

  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(...slate);
  doc.text("Illustrative target return: "+p.ret+"      Possible worst year: "+p.wy, M, y); y+=20;

  if(st.esg){
    const esgLabels={strong:"Important — to be central to portfolio",moderate:"Preferred where possible",neutral:"No strong preference",none:"Not a priority — returns first"};
    doc.setTextColor(...ink); doc.setFontSize(9.5);
    doc.text("ESG preference: "+(esgLabels[st.esg]||st.esg), M, y); y+=20;
  }

  // Disclaimer footer
  const disc="This questionnaire produces an indicative risk profile based solely on self-reported answers and does not constitute a personal recommendation or financial advice. Target returns, worst-year figures and asset allocations are illustrative and not guaranteed. Investments can fall as well as rise and you may get back less than you invest. A suitable recommendation will be made only after a full assessment by your adviser. Trinity Capital Partners trades as Trinity Global Capital UK Ltd and is authorised and regulated by the Financial Conduct Authority (FCA Reg. 523393).";
  doc.setDrawColor(225,227,230); doc.line(M,y,W-M,y); y+=12;
  doc.setFontSize(7.5); doc.setTextColor(...slate);
  doc.text(doc.splitTextToSize(disc, W-2*M), M, y);

  return doc;
}

async function submitToNetlify(){
  const btn = document.getElementById('submitBtn');
  if(btn){ btn.disabled=true; btn.textContent='Submitting…'; }
  const {wt, raw, tot} = calc();
  const {k, capped} = getProf(tot, raw.B||0);
  const p = PROFS[k];
  const esgLabels = {none:'No preference',light:'Light green',deep:'Deep green'};
  // Build payload for serverless SMTP function
  const answerText = QS.map(q => {
    const answered = st.ans[q.id];
    const selectedOpt = q.opts.find(o => o.v === answered);
    return '[' + q.sn + '] Q' + q.id + ': ' + q.t + '\n   Answer: ' + (selectedOpt ? selectedOpt.t : 'Not answered');
  }).join('\n\n');

  const fullSummary =
    'ADVISER: ' + (st.adviser||'Not selected') + '\n' +
    'CLIENT: ' + (st.name||'') + '\n' +
    'EMAIL: ' + (st.email||'') + '\n' +
    'RISK PROFILE: ' + (p?p.label:k) + (capped?' (capped from capacity)':'') + '\n' +
    'SCORE: ' + tot + '\n' +
    'ESG PREFERENCE: ' + (st.esg ? (esgLabels[st.esg]||st.esg) : 'No preference') + '\n' +
    'COMPLETED: ' + new Date().toLocaleString('en-GB') + '\n\n' +
    'CLIENT ANSWERS:\n' + answerText + '\n\n' +
    'ESG: ' + (st.esg ? (ESG_Q.opts.find(o => o.v === st.esg)||{t:'Not answered'}).t : 'Not answered');

  const payload = {
    data: {
      adviser: st.adviser || 'Not selected',
      client_name: st.name || '',
      client_email: st.email || '',
      risk_profile: p ? p.label : k,
      rpq_score: String(tot),
      esg_preference: st.esg ? (esgLabels[st.esg]||st.esg) : 'No preference'
    },
    summary: fullSummary
  };
  // Build PDFs client-side and include base64 attachments
  try{
    // summary PDF
    const summaryDoc = buildPDF();
    const summaryDataUri = summaryDoc.output('datauristring');
    const summaryBase64 = summaryDataUri.split(',')[1];
    // auto-download summary for client
    try{ summaryDoc.save(_lastPdfName); }catch(e){ console.warn('Auto-download failed', e); }

    // compliance PDF (generate but do not save locally)
    const complianceDoc = downloadCompliancePDF(true);
    const complianceBase64 = complianceDoc ? complianceDoc.output('datauristring').split(',')[1] : null;

    payload.summaryPdfBase64 = summaryBase64;
    payload.compliancePdfBase64 = complianceBase64;

    const res = await fetch('/.netlify/functions/submit', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
    });
    if(!res.ok){ const txt = await res.text(); throw new Error(txt||res.statusText); }
    if(btn){ btn.textContent='Submitted ✓'; btn.style.background='#2d7a4f'; }
    const status = document.getElementById('emailStatus');
    if(status) status.textContent = 'Your results have been emailed to the onboarding team.';
  }catch(err){
    console.error('Submit error', err);
    if(btn){ btn.disabled=false; btn.textContent='Submit to your adviser ✓'; }
    const status = document.getElementById('emailStatus');
    if(status) status.textContent = 'Submission failed — email not sent. Please download your PDF and send manually.';
  }
}

function downloadPDF(){
  try{ const doc=buildPDF(); doc.save(_lastPdfName); return doc; }
  catch(e){ alert("Sorry — the PDF could not be generated in this browser."); console.error(e); return null; }
}

function downloadCompliancePDF(noSave){
  try{
    const{raw,wt,tot,k,capped,p}=buildResultPayload();
    const esgMap={strong:'ESG is very important — central to portfolio',moderate:'Somewhat — ESG considered but not at expense of returns',neutral:'No strong preference',none:'Returns prioritised over ESG factors'};
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'pt',format:'a4'});
    const W=doc.internal.pageSize.getWidth();
    const H=doc.internal.pageSize.getHeight();
    const M=40, maxW=W-2*M;
    const navy=[31,41,55],coral=[232,57,74],slate=[107,122,143],ink=[21,29,38],snow=[248,249,251],fog=[220,224,232];
    let y=M;

    const safe=v=>String(v==null?'—':v);

    const newPage=()=>{
      doc.addPage();
      doc.setFillColor(...navy);doc.rect(0,0,W,92,'F');
      doc.setFillColor(...coral);doc.rect(0,92,W,3,'F');
      try{doc.addImage(LOGO_WHITE,'PNG',M,18,Math.round(56*404/334),56);}catch(e){}
      doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);
      doc.text('Risk Profile Questionnaire', W-M, 34, {align:'right'});
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(220,220,220);
      doc.text('Compliance & Audit Document', W-M, 52, {align:'right'});

      doc.text('Trinity Capital Partners  |  FCA Reg. 523393', W-M, 82, {align:'right'});
      y=112;
    };

    const checkY=(need)=>{ if(y+need>H-32) newPage(); };

    const sectionHead=(title)=>{
      checkY(22);
      y+=4;
      doc.setFillColor(...snow);doc.rect(M,y-10,maxW,18,'F');
      doc.setFillColor(...coral);doc.rect(M,y-10,3,18,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...ink);
      doc.text(title.toUpperCase(),M+8,y+2);
      y+=14;
    };

    const dataRow=(label,value)=>{
      const val=safe(value);
      if(!val||val==='—'&&!label) return;
      checkY(14);
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...slate);
      doc.text(safe(label),M,y);
      doc.setTextColor(...ink);
      const vLines=doc.splitTextToSize(val,maxW-160);
      doc.text(vLines,W-M,y,{align:'right'});
      doc.setDrawColor(...fog);doc.setLineWidth(0.2);doc.line(M,y+3,W-M,y+3);
      y+=12*Math.max(vLines.length,1)+2;
    };

    const totRow=(label,value)=>{
      checkY(16);
      doc.setDrawColor(...coral);doc.setLineWidth(1);doc.line(M,y-2,W-M,y-2);
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...coral);
      doc.text(safe(label),M,y+3);
      doc.text(safe(value),W-M,y+3,{align:'right'});
      y+=16;
    };

    const bodyText=(text)=>{
      if(!text) return;
      const lines=doc.splitTextToSize(safe(text),maxW);
      lines.forEach(l=>{
        checkY(12);
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...ink);
        if(l) doc.text(l,M,y);
        y+=12;
      });
      y+=4;
    };

    // ── HEADER (logo left, title block right) ──
    doc.setFillColor(...navy);doc.rect(0,0,W,92,'F');
    doc.setFillColor(...coral);doc.rect(0,92,W,3,'F');
    try{doc.addImage(LOGO_WHITE,'PNG',M,18,Math.round(56*404/334),56);}catch(e){}
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);
    // Title block on right
    doc.text('Risk Profile Questionnaire', W-M, 34, {align:'right'});
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(220,220,220);
    doc.text('Compliance & Audit Document', W-M, 52, {align:'right'});
    doc.text('Confidential — Adviser Use Only', W-M, 66, {align:'right'});
    doc.text('Trinity Capital Partners  |  FCA Reg. 523393', W-M, 82, {align:'right'});
    y = 112;

    // ── CLIENT SUMMARY — render as two-column table like the sample
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...ink);
    doc.setFillColor(255,255,255);
    // Header label
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...coral);
    doc.text('CLIENT & ASSESSMENT SUMMARY', M, y);
    y += 14;
    doc.setDrawColor(...fog);doc.setLineWidth(0.6);doc.line(M,y, W-M, y); y+=8;

    // helper to render label/value in two columns (label left, value right)
    const row = (label, value)=>{
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...slate);
      doc.text(label, M, y);
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...ink);
      doc.text(String(value||'—'), W-M, y, {align:'right'});
      y+=14;
      doc.setDrawColor(240,242,245);doc.setLineWidth(0.5);doc.line(M,y-6,W-M,y-6);
    };

    row('Client name', st.name||'—');

    row('Total weighted score', tot+' out of 100');
    row('Indicative risk profile', (p?p.label:k)+(capped?' (capacity override applied)':''));
    row('Score band', p?p.band:'—');
    row('ESG preference', st.esg ? (esgMap[st.esg]||st.esg) : 'Not recorded');

    y+=6;

    // ── SCORING METHODOLOGY ──
    sectionHead('Scoring Methodology');
    bodyText('The questionnaire has 16 questions across five sections. Each answer is scored 1 (lowest risk) to 5 (highest risk). Raw section scores are multiplied by a section weighting to produce weighted scores, which are summed to give a total out of 100.');
    // small table header
    checkY(28);
    const tableX = M; const col1 = M+8; const col2 = M+150; const col3 = M+260; const col4 = W-M-60;
    doc.setFillColor(...navy); doc.rect(tableX, y, W-2*M, 20, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
    doc.text('Section', col1, y+14); doc.text('Name', col2, y+14); doc.text('Questions', col3, y+14); doc.text('Weight', col4, y+14, {align:'right'});
    y += 26;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...ink);
    const secs=[['A','Attitude to Risk','Q1-Q5','35%'],['B','Capacity for Loss','Q6-Q10','30%'],['C','Time Horizon','Q11-Q12','15%'],['D','Knowledge & Experience','Q13-Q14','10%'],['E','Behavioural Factors','Q15-Q16','10%']];
    secs.forEach((r,i)=>{
      checkY(16);
      if(i%2===0) { doc.setFillColor(248,249,250); doc.rect(tableX,y-4,W-2*M,16,'F'); }
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...ink);
      doc.text(r[0], col1, y+10); doc.text(r[1], col2, y+10); doc.text(r[2], col3, y+10); doc.text(r[3], col4, y+10, {align:'right'});
      y+=16;
    });
    y+=8;

    // ── SCORE BANDS ──
    sectionHead('Score Bands — Client Result Highlighted');
    const bands=[['Low Risk','0 – 24'],['Cautious','25 – 44'],['Balanced','45 – 64'],['Adventurous','65 – 82'],['High Risk','83 – 100']];
    bands.forEach(b=>{
      checkY(14);
      const isMatch = (p && p.label && b[0].toLowerCase().includes(p.label.toLowerCase().split(' ')[0]));
      if(isMatch){ doc.setFillColor(255,240,241); doc.rect(M,y-6,W-2*M,14,'F'); }
      doc.setFont('helvetica', isMatch ? 'bold' : 'normal'); doc.setFontSize(9); doc.setTextColor(...ink);
      doc.text(b[0], M+6, y+6); doc.text(b[1], W-M, y+6, {align:'right'});
      y+=14;
    });
    y+=8;

    // ── SECTION SCORES & WEIGHTED RESULTS ──
    sectionHead('Section Scores & Weighted Results');
    ['A','B','C','D','E'].forEach(s=>{
      checkY(14);
      const meta = SMETA[s];
      const rawVal = raw[s] || 0;
      const wscore = +(wt[s]||0);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...ink);
      doc.text(meta.n, M, y);
      const rightText = 'Raw: '+rawVal+'/'+( (s==='A')?25:(s==='B')?25:(s==='C')?10:(s==='D')?10:10 )+'  x'+WT[s]+'  = '+wscore.toFixed(1)+'/'+meta.w;
      doc.text(rightText, W-M, y, {align:'right'});
      y+=14;

    // TOTAL weighted score block

      // Answer lines (below question)
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...coral);
      aLines.forEach((l,i)=>{ doc.text(l, M+6, y + (qLines.length * lineH) + 6 + (i * lineH)); });
      // Score aligned vertically to middle of the block
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...slate);
      const scoreY = y + Math.max((totalLines * lineH)/2, lineH) - 6;
      doc.text('Score: '+(ans||'—'), W-M, scoreY, {align:'right'});
      y += blockHeight;
      y += 6;
    });
    y+=6;

    // ESG, Capacity override, Rationale, Compliance statement
    sectionHead('ESG Preference');
    bodyText(ESG_Q.t);
    bodyText('Answer: '+(st.esg ? (ESG_Q.opts.find(o=>o.v===st.esg).t) : 'Not answered'));
    sectionHead('Capacity for Loss Override');
    if(capped) bodyText('OVERRIDE APPLIED. The client raw Section B score was '+(raw.B||0)+' out of 25. A score of 10 or below triggers a mandatory downgrade to Cautious.');
    else bodyText('No override applied. The client raw Section B score was '+(raw.B||0)+' out of 25, which is above the override threshold of 10.');
    sectionHead('Profile Rationale — '+(p?p.label:k));
    bodyText(p.desc || '');
    bodyText('Key data points influencing this outcome:');
    ['Section A (Attitude to Risk) contributed '+(+(wt.A||0)).toFixed(1)+' weighted points — the highest-weighted section (x1.4).','Section B (Capacity for Loss) contributed '+(+(wt.B||0)).toFixed(1)+' weighted points (x1.2).','Section C (Time Horizon) contributed '+(+(wt.C||0)).toFixed(1)+' weighted points (x1.5).','Section D (Knowledge & Experience) contributed '+(+(wt.D||0)).toFixed(1)+' weighted points.','Section E (Behavioural Factors) contributed '+(+(wt.E||0)).toFixed(1)+' weighted points.'].forEach(line=>{ bodyText('• '+line); });
    sectionHead('Compliance Statement');
    bodyText('This document is produced solely for the use of Trinity Capital Partners and its authorised advisers. It is not for distribution to the client.');
    bodyText('The risk profile is indicative only, based on self-reported answers at the time of completion. It must be reviewed alongside the client full fact find, stated objectives, tax position, and any other material information gathered during the advice process.');
    bodyText('Trinity Capital Partners (FCA Reg. 523393), trading as Trinity Global Capital UK Ltd, is authorised and regulated by the Financial Conduct Authority. Advisers must ensure any recommended strategy is suitable under COBS 9 of the FCA Handbook. This document should be retained on the client file as part of the suitability audit trail.');


    const pages=doc.getNumberOfPages();
    for(let i=1;i<=pages;i++){
      doc.setPage(i);
      doc.setDrawColor(...fog);doc.setLineWidth(0.4);doc.line(M,H-24,W-M,H-24);
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...slate);
      doc.text('Trinity Capital Partners  |  FCA Reg. 523393  |  Compliance Document  |  Adviser Use Only',W/2,H-14,{align:'center'});
      doc.text('Page '+i+' of '+pages,W-M,H-14,{align:'right'});
      doc.text(new Date().toLocaleDateString('en-GB'),M,H-14);
    }

    if(noSave) return doc;
    const fname='Trinity-RPQ-Compliance-'+safe(st.name||'Client').replace(/[^a-z0-9]+/gi,'-')+'-'+new Date().toISOString().slice(0,10)+'.pdf';
    doc.save(fname);
    return doc;
  }catch(err){
    alert('Compliance PDF error: '+err.message+' | '+err.stack);
    console.error(err);
    return null;
  }
}

function sendResults(){
  if(_sent) return; _sent=true;
  const status=document.getElementById("emailStatus");
  let doc;
  try{
    doc=buildPDF();
    _lastPdfName=("Trinity-Risk-Profile-"+(st.name||"Client").replace(/[^a-z0-9]+/gi,"-")+".pdf");
    _lastPdfBase64=doc.output("datauristring").split(",")[1];
  }catch(e){ console.error("PDF build failed",e); if(status)status.textContent=""; return; }

  // Capture full result object for CRM / webhook
  const{raw,wt,tot,k,capped,p}=buildResultPayload();
  window.TRINITY_RPQ_RESULT={
    client:{name:st.name,email:st.email},
    answers:st.ans, esg:st.esg,
    sections:wt, sectionsRaw:raw, total:tot,
    profile:p.label, profileNumber:p.id, cflOverride:capped,
    completedAt:new Date().toISOString()
  };

  const configured = EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY.indexOf("YOUR_")!==0
                  && typeof emailjs!=="undefined";
  if(!configured){
    if(status) status.textContent="Email delivery isn’t configured yet — use the button below to download your summary.";
    return;
  }

  try{ emailjs.init({publicKey:EMAILJS_PUBLIC_KEY}); }catch(e){}
  const shared={
    client_name: st.name,
    client_email: st.email,
    adviser: st.adviser || 'Not selected',
    profile: p.label,
    score: String(tot),
    summary: p.tag+" — "+p.desc,
    onboarding_mailbox: ONBOARDING_MAILBOX,
    pdf_name: _lastPdfName,
    pdf_base64: _lastPdfBase64
  };
  if(status) status.textContent="Sending your summary to the onboarding mailbox…";
  // Send only one internal email — do not send a client copy from the app
  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_INTERNAL, Object.assign({to_email:ONBOARDING_MAILBOX, adviser_routing: st.adviser||'Not selected'}, shared))
    .then(()=>{
      if(status) status.textContent="Summary emailed to the onboarding mailbox.";
    }).catch(()=>{
      if(status) status.textContent="Couldn’t email automatically — please download the summary and upload to the CRM.";
    });
}

(function(){ var l=document.getElementById("brandLogo"); if(l) l.src=LOGO_NAVY; })();


render();
</script>
